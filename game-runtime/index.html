<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Game — runs a bundle</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0c0d11; color: #e6e7ea;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    .wrap { display: flex; flex-direction: column; height: 100%; }
    .bar { padding: 8px 12px; background: #1e1f26; border-bottom: 1px solid #3a3d49;
      display: flex; gap: 12px; align-items: center; }
    .bar b { color: #ffd166; }
    #hud { color: #9a9da8; font-size: 12px; font-variant-numeric: tabular-nums; }
    .stage { flex: 1; min-height: 0; display: grid; place-items: center; }
    #game { background: #0c0d11; image-rendering: pixelated;
      box-shadow: 0 0 0 1px #3a3d49; max-width: 100%; max-height: 100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <b>🎮 Demo Game</b>
      <span id="hud">loading bundle…</span>
    </div>
    <div class="stage">
      <canvas id="game" width="960" height="600"></canvas>
    </div>
  </div>
  <script type="module" src="game.js"></script>
</body>
</html>
